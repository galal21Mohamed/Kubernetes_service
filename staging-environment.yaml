apiVersion: v1
kind: Pod
metadata:
  name: backend-pod
  namespace: staging
  labels:
    app: backend
spec:
  containers:
    - name: backend
      image: backend-app:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: staging
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-pod
  namespace: staging
  labels:
    app: frontend
spec:
  containers:
    - name: frontend
      image: frontend-app:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 80
